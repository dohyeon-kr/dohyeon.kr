name: Release & Deploy Ghost

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm semantic-release || echo "NO_RELEASE=true" >> $GITHUB_ENV

  deploy:
    runs-on: self-hosted
    needs: release

    steps:
      - name: Checkout deploy assets
        uses: actions/checkout@v4

      - name: Import SOPS age key from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.dohyeon.kr
          method: jwt
          path: jwt
          role: dohyeon-kr-deploy
          jwtGithubAudience: vault.dohyeon.kr
          secrets: |
            kv/data/sops/dohyeon-kr age_key | SOPS_AGE_KEY

      - name: Decrypt env file
        run: |
          sops -d --input-type dotenv --output-type dotenv secrets/ghost.env.enc > .env
          chmod 600 .env

      - name: Deploy Ghost
        run: sudo /usr/local/sbin/deploy-ghost-blog "$GITHUB_WORKSPACE"
